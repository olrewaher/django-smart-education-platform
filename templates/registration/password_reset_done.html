{% extends "base.html" %}
{% block title %}邮件已发送{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-lg border-0 p-5 text-center" style="width: 500px; border-radius: 16px;">
        <div class="text-success mb-3 animate__animated animate__bounceIn">
            <i class="bi bi-send-check-fill" style="font-size: 4rem;"></i>
        </div>
        <h3 class="fw-bold mb-3">邮件发送成功！</h3>
        <p class="text-muted mb-4">
            我们已向您的邮箱发送了一封包含重置链接的邮件。<br>
            请登录邮箱查收，并点击链接设置新密码。
        </p>
        <div class="alert alert-light border small text-muted">
            <i class="bi bi-info-circle me-1"></i> 没收到？请检查垃圾箱，或等待几分钟。
        </div>
        <a href="{% url 'login' %}" class="btn btn-outline-primary rounded-pill px-4 mt-3">返回登录</a>
    </div>
</div>
{% endblock %}

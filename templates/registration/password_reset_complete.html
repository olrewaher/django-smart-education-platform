{% extends "base.html" %}
{% block title %}密码修改成功{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-lg border-0 p-5 text-center" style="width: 450px; border-radius: 16px;">
        <div class="text-primary mb-3 animate__animated animate__fadeIn">
            <i class="bi bi-check-circle-fill" style="font-size: 4rem;"></i>
        </div>
        <h3 class="fw-bold mb-3">密码修改成功</h3>
        <p class="text-muted mb-4">
            您的密码已更新，现在可以使用新密码登录了。
        </p>
        <div class="d-grid gap-2">
            <a href="{% url 'login' %}" class="btn btn-primary btn-lg rounded-pill fw-bold">前往学生登录</a>
            <a href="/admin/login/" class="btn btn-outline-danger btn-lg rounded-pill fw-bold">前往教师登录</a>
        </div>
    </div>
</div>
{% endblock %}

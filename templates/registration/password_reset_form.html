{% extends "base.html" %}
{% load static %}
{% block title %}找回密码 - 思政案例库{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-lg border-0 p-4" style="width: 450px; border-radius: 16px;">
        <div class="text-center mb-4">
            <div class="text-primary mb-2"><i class="bi bi-key-fill fs-1"></i></div>
            <h4 class="fw-bold">找回密码</h4>
            <p class="text-muted small">请输入您注册时的电子邮箱，用于接收重置链接。</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control form-control-lg fs-6 bg-light border-start-0"
                           placeholder="name@example.com" required>
                </div>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">发送重置链接</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

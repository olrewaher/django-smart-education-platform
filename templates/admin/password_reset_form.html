{% load static %}
<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 教师管理端</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* ========== 🔴 教师端红色主题系统 ========== */
        :root {
            --theme-color-primary: #dc3545;  /* 教师红 */
            --theme-color-hover: #bb2d3b;
            --theme-bg-gradient-start: #fff5f5;
            --theme-bg-gradient-end: #f8d7da;
        }

        body {
            /* 留出导航栏高度 */
            padding-top: 70px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(135deg, var(--theme-bg-gradient-start) 0%, var(--theme-bg-gradient-end) 100%);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        /* 顶部导航栏 (仿照学生端 base.html 但改为红色) */
        .navbar-custom {
            background-color: var(--theme-color-primary);
            box-shadow: 0 4px 10px rgba(220, 53, 69, 0.2);
        }

        /* 中间卡片区域 */
        .main-wrapper {
            flex: 1; /* 撑开高度，让 Footer 沉底 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            width: 100%;
            max-width: 460px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(220, 53, 69, 0.1);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
        }

        /* 按钮与输入框 */
        .btn-theme {
            background-color: var(--theme-color-primary);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-theme:hover {
            background-color: var(--theme-color-hover);
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
        .form-control {
            padding: 0.8rem 1rem;
            border-radius: 10px;
        }
        .form-control:focus {
            border-color: var(--theme-color-primary);
            box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top" style="min-height: 64px;">
        <div class="container">
            <span class="navbar-brand fw-bold d-flex align-items-center">
                <i class="bi bi-person-workspace me-2 fs-4"></i>
                <span>思政案例库 | 教师端</span>
            </span>
            
            <div class="ms-auto">
                <a href="/admin/login/" class="btn btn-sm btn-outline-light rounded-pill px-3 fw-bold border-2">
                    <i class="bi bi-arrow-return-left me-1"></i> 返回登录
                </a>
            </div>
        </div>
    </nav>

    <div class="container main-wrapper animate__animated animate__fadeIn">
        <div class="card card-custom p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="d-inline-block p-3 rounded-circle bg-danger bg-opacity-10 mb-3 text-danger">
                    <i class="bi bi-shield-lock-fill fs-1"></i>
                </div>
                <h4 class="fw-bold text-dark">重置教师密码</h4>
                <p class="text-muted small">
                    请输入您的管理员邮箱，系统将发送重置链接。<br>
                    <span class="text-danger bg-danger bg-opacity-10 px-2 rounded mt-1 d-inline-block">仅限内部授权人员</span>
                </p>
            </div>

            <form method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary ps-1">注册邮箱</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-danger border-secondary border-opacity-25">
                            <i class="bi bi-envelope-check-fill"></i>
                        </span>
                        <input type="email" name="email" class="form-control form-control-lg fs-6 bg-light border-start-0 border-secondary border-opacity-25" 
                               placeholder="admin@school.edu.cn" required autofocus
                               style="border-radius: 0 10px 10px 0;">
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-theme">
                        发送验证邮件 <i class="bi bi-send-fill ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer class="text-center py-4 text-muted border-top mt-auto bg-white">
        <div class="container">
            <p class="mb-0 small">
                &copy; 2025 思政案例管理后台 <span class="mx-2">|</span> 仅限授权访问
            </p>
        </div>
    </footer>

</body>
</html>

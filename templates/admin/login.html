{% load static %}
<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理后台 - 登录</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* ========== 🔴 教师端现代红色主题 (Modern Capsule Red) ========== */
        :root {
            /* 使用与后台 admin_modern_red.css 一致的高级红 */
            --theme-color-primary: #d93025;
            --theme-color-hover: #b3261e;
            --theme-bg-gradient-start: #fff5f5;
            --theme-bg-gradient-end: #f8d7da;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(135deg, var(--theme-bg-gradient-start) 0%, var(--theme-bg-gradient-end) 100%);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            /* 柔和的红色阴影，增加悬浮感 */
            box-shadow: 0 20px 40px rgba(220, 53, 69, 0.15);
            /* 大圆角卡片 */
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
        }

        .card-header {
            background-color: var(--theme-color-primary);
            color: white;
            text-align: center;
            padding: 2.5rem 1rem 2rem;
            position: relative;
            border: none;
        }

        .header-icon-large {
            font-size: 4rem;
            opacity: 0.2;
            position: absolute;
            top: 5px;
            right: 15px;
            transform: rotate(-15deg);
        }

        .card-body { padding: 2.5rem; }

        .form-control {
            padding: 0.8rem 1rem;
            /* 胶囊式输入框 */
            border-radius: 12px;
            border-color: #eee;
            background-color: #fcfcfc;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--theme-color-primary);
            box-shadow: 0 0 0 0.25rem rgba(217, 48, 37, 0.15);
            background-color: #fff;
        }

        .input-group-text {
            color: var(--theme-color-primary);
            background-color: #fff5f5;
            border-color: #eee;
            border-radius: 12px 0 0 12px;
        }

        .btn-theme {
            background-color: var(--theme-color-primary);
            color: white;
            border: none;
            padding: 0.8rem;
            font-size: 1.1rem;
            /* 完全胶囊按钮 */
            border-radius: 50px;
            width: 100%;
            margin-top: 1.5rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(217, 48, 37, 0.2);
        }

        .btn-theme:hover {
            background-color: var(--theme-color-hover);
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 6px 15px rgba(217, 48, 37, 0.3);
        }

        /* 忘记密码链接样式 */
        .forgot-link {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
        }
        .forgot-link:hover {
            color: var(--theme-color-primary);
        }

        .switch-link {
            color: #666;
            text-decoration: none;
            transition: all 0.2s;
        }
        .switch-link:hover {
            color: var(--theme-color-primary);
        }
    </style>
</head>
<body>

    <div class="card login-card animate__animated animate__fadeIn">
        <div class="card-header">
            <i class="bi bi-person-workspace header-icon-large"></i>
            <h3 class="mb-1 fw-bold"><i class="bi bi-shield-lock-fill me-2"></i>教师管理端</h3>
            <p class="mb-0 opacity-75 small">思政案例库 - 统一认证后台</p>
        </div>

        <div class="card-body">
            <form action="{{ app_path }}" method="post">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="alert alert-danger py-2 small text-center mb-4 border-0 bg-danger bg-opacity-10 text-danger rounded-3">
                        <i class="bi bi-exclamation-circle-fill me-1"></i> 账号或密码错误
                    </div>
                {% endif %}

                <div class="mb-4">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="管理员账号" required autofocus>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="密码" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-theme">
                    安全登录 <i class="bi bi-box-arrow-in-right ms-2"></i>
                </button>
                <input type="hidden" name="next" value="{{ next }}">

                <div class="d-flex justify-content-end mt-3">
                    <a href="{% url 'admin_password_reset' %}" class="forgot-link">
                        <i class="bi bi-question-circle me-1"></i> 忘记密码?
                    </a>
                </div>
            </form>
        </div>

        <div class="card-footer text-center bg-transparent border-0 pb-4 pt-0">
            <hr class="text-muted opacity-25 mb-3">
            <p class="text-muted small mb-3">仅限授权教师访问</p>
            <div class="d-grid gap-2 col-8 mx-auto">
                <a href="/login/" class="btn btn-light btn-sm rounded-pill py-2 border switch-link">
                    <i class="bi bi-mortarboard me-1"></i> 我是学生？切换到学生端
                </a>
            </div>
        </div>
    </div>

</body>
</html>

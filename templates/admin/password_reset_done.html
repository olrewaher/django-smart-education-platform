{% load static %}
<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <title>邮件已发送</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* 🔴 红色主题复用 */
        :root {
            --theme-color-primary: #dc3545;
            --theme-bg-gradient-start: #fff5f5;
            --theme-bg-gradient-end: #f8d7da;
        }
        body {
            padding-top: 70px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(135deg, var(--theme-bg-gradient-start) 0%, var(--theme-bg-gradient-end) 100%);
            font-family: system-ui, -apple-system, sans-serif;
        }
        .navbar-custom { background-color: var(--theme-color-primary); box-shadow: 0 4px 10px rgba(220, 53, 69, 0.2); }
        
        .main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; }
        
        .card-custom {
            width: 100%; max-width: 500px;
            border: none; border-radius: 16px;
            box-shadow: 0 15px 35px rgba(220, 53, 69, 0.1);
            background: rgba(255, 255, 255, 0.98);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top" style="min-height: 64px;">
        <div class="container">
            <span class="navbar-brand fw-bold d-flex align-items-center">
                <i class="bi bi-person-workspace me-2 fs-4"></i>
                <span>思政案例库 | 教师端</span>
            </span>
        </div>
    </nav>

    <div class="container main-wrapper animate__animated animate__zoomIn">
        <div class="card card-custom p-5 text-center">
            
            <div class="mb-4 text-danger">
                <i class="bi bi-envelope-paper-heart-fill" style="font-size: 5rem; filter: drop-shadow(0 4px 6px rgba(220, 53, 69, 0.2));"></i>
            </div>
            
            <h3 class="fw-bold mb-3 text-dark">邮件已发送</h3>
            
            <p class="text-muted mb-4 px-3" style="line-height: 1.6;">
                我们已向该邮箱发送了一封包含重置链接的邮件。<br>
                请查收邮件，并按照提示完成密码重置。
            </p>

            <div class="alert alert-light border small text-muted mb-4">
                <i class="bi bi-info-circle-fill me-1 text-danger"></i> 提示：如果是本地开发环境，请查看 PyCharm 控制台。
            </div>
            
            <div class="d-grid gap-2">
                <a href="/admin/login/" class="btn btn-outline-danger rounded-pill py-2 fw-bold">
                    返回教师登录
                </a>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 text-muted border-top mt-auto bg-white">
        <div class="container">
            <p class="mb-0 small">
                &copy; 2025 思政案例管理后台 <span class="mx-2">|</span> 仅限授权访问
            </p>
        </div>
    </footer>

</body>
</html>

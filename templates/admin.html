{% load static %}
<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师端登录 - 思政案例库</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        .card-header {
            background-color: #0d6efd; /* 和学生端主色调一致 */
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            border: none;
        }
        .card-body {
            padding: 2rem;
            background: white;
        }
        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }
        .btn-login {
            padding: 0.75rem;
            font-size: 1rem;
            border-radius: 8px;
            width: 100%;
            margin-top: 1rem;
        }
        .error-msg {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card login-card animate__animated animate__fadeInUp">
        <div class="card-header">
            <h3 class="mb-0"><i class="bi bi-person-workspace"></i> 教师管理端</h3>
            <p class="mb-0 opacity-75 small">思政案例教学资源库</p>
        </div>
        <div class="card-body">
            <form action="{{ app_path }}" method="post" id="login-form">
                {% csrf_token %}

                {% if form.errors and not form.non_field_errors %}
                    <div class="alert alert-danger py-2 small">
                        用户名或密码错误，请重试
                    </div>
                {% endif %}

                {% if form.non_field_errors %}
                    <div class="alert alert-danger py-2 small">
                        {% for error in form.non_field_errors %}
                            {{ error }}
                        {% endfor %}
                    </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label text-muted">管理员账号</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="请输入教工号/用户名" required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted">密码</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-key"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> 立即登录
                </button>

                <input type="hidden" name="next" value="{{ next }}">
            </form>
        </div>
        <div class="card-footer text-center bg-white border-0 pb-3">
            <a href="/" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left"></i> 返回学生端首页
            </a>
        </div>
    </div>

</body>
</html>

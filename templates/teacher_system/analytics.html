{% load static %}
<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <title>智慧学情驾驶舱</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background-color: #f0f2f5; padding: 20px; font-family: 'Segoe UI', Roboto, sans-serif; }
        .card { border: none; box-shadow: 0 4px 20px 0 rgba(0,0,0,.05); margin-bottom: 20px; border-radius: 8px; }
        .card-header { background-color: #fff; border-bottom: 1px solid #f0f0f0; font-weight: 600; color: #333; padding: 15px 20px; }
        .chart-container { width: 100%; height: 350px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>🚀 智慧学情数据中心 <small class="text-muted" style="font-size: 0.6em;">Data Intelligence Dashboard</small></h3>
        <button class="btn btn-outline-primary btn-sm" onclick="location.reload()">🔄 刷新数据</button>
    </div>
    
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">📅 班级学习活跃度热力图 (过去一年)</div>
                <div class="card-body">
                    <div id="heatmap-chart" style="width: 100%; height: 200px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header">📊 课程热度与互动趋势</div>
                <div class="card-body">
                    <div id="bar-chart" class="chart-container"></div>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card">
                <div class="card-header">🧬 活跃学生五维能力画像</div>
                <div class="card-body">
                    <div id="radar-chart" class="chart-container"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">🏆 综合表现排行榜</div>
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>排名</th>
                                <th>学生姓名</th>
                                <th>学习时长</th>
                                <th>活跃积分 (算法计算)</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for student in student_list %}
                            <tr>
                                <td><span class="badge rounded-pill bg-warning text-dark">{{ forloop.counter }}</span></td>
                                <td class="fw-bold">{{ student.name }}</td>
                                <td>{{ student.duration }}</td>
                                <td>
                                    <div class="progress" style="height: 6px; width: 100px;">
                                        <div class="progress-bar bg-success" role="progressbar" style="width: {{ student.score }}%"></div>
                                    </div>
                                </td>
                                <td><span class="badge bg-light text-success">活跃</span></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    // 1. 热力图 (Heatmap)
    var heatmapChart = echarts.init(document.getElementById('heatmap-chart'));
    var heatmapData = {{ heatmap_data|safe}};
    var heatmapRange = {{ heatmap_range|safe}}; // <--- 接收后端传来的动态范围
    var optionHeat = {
        tooltip: { position: 'top', formatter: '{c} 次互动' },
        visualMap: {
            min: 0, max: 10, type: 'piecewise', orient: 'horizontal', left: 'center', top: 0,
            inRange: { color: ['#ebedf0', '#9be9a8', '#40c463', '#30a14e', '#216e39'] } // GitHub 风格配色
        },
        calendar: {
            top: 40, left: 30, right: 30, 
            cellSize: ['auto', 13],
            range: heatmapRange, // 根据当前年份自动调整
            itemStyle: { borderWidth: 0.5 },
            yearLabel: { show: false } // 关掉年份显示，因为它跨年了显示出来会乱
        },
        series: [{ type: 'heatmap', coordinateSystem: 'calendar', data: heatmapData }]
    };
    heatmapChart.setOption(optionHeat);

    // 2. 课程分析 (Bar + Line)
    var barChart = echarts.init(document.getElementById('bar-chart'));
    var optionBar = {
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
        legend: { data: ['浏览时长', '互动次数'] },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: [{ type: 'category', data: {{ chart_labels|safe }}, axisTick: { alignWithLabel: true } }],
        yAxis: [
            { type: 'value', name: '分钟', position: 'left' },
            { type: 'value', name: '次数', position: 'right' }
        ],
        series: [
            { name: '浏览时长', type: 'bar', data: {{ chart_data_duration|safe }}, itemStyle: { color: '#5470C6' } },
            { name: '互动次数', type: 'line', yAxisIndex: 1, data: {{ chart_data_interaction|safe }}, itemStyle: { color: '#91CC75' }, smooth: true }
        ]
    };
    barChart.setOption(optionBar);

    // 3. 雷达图 (Radar)
    var radarChart = echarts.init(document.getElementById('radar-chart'));
    var optionRadar = {
        tooltip: {},
        legend: { bottom: 0 },
        radar: {
            indicator: [
                { name: '学习时长', max: 300 },
                { name: '评论', max: 20 },
                { name: '笔记', max: 10 },
                { name: '收藏', max: 10 },
                { name: '点赞', max: 20 }
            ],
            radius: '65%'
        },
        series: [{
            name: '学生能力对比',
            type: 'radar',
            data: {{ radar_data|safe }},
            areaStyle: { opacity: 0.2 }
        }]
    };
    radarChart.setOption(optionRadar);

    // 自适应
    window.addEventListener('resize', function() {
        heatmapChart.resize();
        barChart.resize();
        radarChart.resize();
    });
</script>
</body>
</html>
